<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gái Đẹp Casino - Nặn Bí Mật</title>
    <style>
        :root { --gold: #ffcc00; --red: #ff3333; --blue: #3498db; --bg: #0d0d0d; --green: #2ecc71; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; user-select: none; overflow: hidden; height: 100vh; width: 100vw; }
        
        /* Header */
        .header { background: #000; width: 100%; padding: 12px 0; border-bottom: 2px solid var(--gold); position: relative; z-index: 2000; }
        .top-info { display: flex; justify-content: space-around; align-items: center; width: 100%; }
        .balance { font-size: 22px; color: var(--gold); font-weight: bold; text-shadow: 0 0 10px gold; }
        .btn-sm { padding: 6px 15px; border-radius: 5px; font-weight: bold; border: none; font-size: 12px; cursor: pointer; background: var(--green); color: #000; }

        #sidebar { position: fixed; top: 0; left: -100%; width: 260px; height: 100%; background: #111; z-index: 5000; transition: 0.3s; border-right: 2px solid var(--gold); padding: 20px; box-sizing: border-box; }
        #sidebar.open { left: 0; }
        .menu-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; color: var(--gold); font-weight: bold; font-size: 18px; }

        .game-screen { display: flex; flex-direction: column; align-items: center; width: 100vw; height: calc(100vh - 80px); padding-top: 10px; }
        .timer-box { font-size: 45px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px orange; margin-bottom: 5px; }
        .history-board { width: 95%; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 5px auto; display: flex; gap: 4px; padding: 6px; overflow-x: auto; min-height: 25px; border: 1px solid #333; }
        .dot { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; color: white; font-weight: bold; }
        .dot-tai { background: var(--red); } .dot-xiu { background: var(--blue); }

        .table { width: 95%; background: radial-gradient(circle, #1a2a3a, #000); border-radius: 30px; border: 3px solid #444; padding: 15px 0; display: flex; flex-direction: column; align-items: center; position: relative; }
        .bet-info { background: rgba(0,0,0,0.8); padding: 5px 20px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; margin-bottom: 10px; font-size: 18px; }

        .bowl-wrap { position: relative; width: 220px; height: 220px; background: #111; border-radius: 50%; border: 8px solid #5d3a1a; display: flex; align-items: center; justify-content: center; touch-action: none; overflow: visible; }
        .dice { width: 45px; height: 45px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: black; font-size: 35px; margin: 0 3px; z-index: 1; }
        
        /* BÁT - Quan trọng: z-index cao hơn xúc xắc */
        #bowl { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #eee, #888, #444); border-radius: 50%; 
            z-index: 100; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; color: #222; font-size: 18px; box-shadow: 0 10px 30px #000;
            touch-action: none; cursor: grab; transition: none;
        }

        .bowl-fly-up { animation: bUp 0.6s forwards; }
        @keyframes bUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-400px); opacity: 0; } }
        
        .bowl-fly-down { animation: bDown 0.6s ease-in forwards; }
        @keyframes bDown { 0% { transform: translateY(-400px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        .dice-spin { animation: dSpin 0.5s infinite; }
        @keyframes dSpin { 0% { transform: scale(1.2) rotate(0); } 100% { transform: scale(1.2) rotate(360deg); } }

        .chips { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 92%; margin-top: 15px; }
        .chip { height: 42px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; cursor: pointer; color: #fff; background: #34495e; }
        .active-side { border: 4px solid var(--gold) !important; background: rgba(255, 204, 0, 0.3) !important; }

        #win-txt { position: fixed; top: 40%; left: 50%; transform: translateX(-50%); font-size: 60px; color: var(--gold); font-weight: bold; opacity: 0; pointer-events: none; z-index: 6000; text-shadow: 0 0 20px #000; }
        .fly { animation: winFly 2s forwards; }
        @keyframes winFly { 0% { opacity: 0; transform: translate(-50%, 0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -200px); } }
    </style>
</head>
<body>

    <audio id="s-shake" src="https://www.soundjay.com/misc/sounds/dice-shake-1.mp3"></audio>
    <audio id="s-win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div id="sidebar">
        <div class="menu-item" onclick="switchGame('taixiu')">🎲 TÀI XỈU 60S REAL</div>
        <div class="menu-item" onclick="localStorage.clear(); location.reload();" style="color:red; margin-top:50px;">🗑️ RESET TẤT CẢ</div>
    </div>

    <div class="header">
        <div class="top-info">
            <div onclick="toggleMenu()" style="font-size:32px; color:var(--gold); cursor:pointer;">☰</div>
            <div class="balance">💰 <span id="money">0</span></div>
            <button class="btn-sm" onclick="bal+=1000000; updateUI();">NẠP 1M</button>
        </div>
    </div>

    <div id="win-txt">+0</div>

    <div class="game-screen">
        <div class="timer-box" id="timer">60</div>
        <div class="history-board" id="tx-hist"></div>
        <div class="table">
            <div style="display:flex; width:100%; justify-content:space-around; margin-bottom:10px;">
                <div id="side-xiu" onclick="setSide('xiu')" style="font-size:45px; font-weight:900;">XỈU</div>
                <div id="side-tai" onclick="setSide('tai')" style="font-size:45px; font-weight:900; color:var(--red);">TÀI</div>
            </div>
            <div class="bet-info">ĐÃ CƯỢC: <span id="tx-bet">0</span></div>
            <div class="bowl-wrap" id="nan-zone">
                <div id="bowl">ÚP BÁT</div>
                <div style="display:flex;">
                    <div id="d1" class="dice">?</div>
                    <div id="d2" class="dice">?</div>
                    <div id="d3" class="dice">?</div>
                </div>
            </div>
        </div>
        <div class="chips" id="tx-chips"></div>
    </div>

<script>
    let bal = localStorage.getItem('casino_bal') ? parseInt(localStorage.getItem('casino_bal')) : 1000000;
    let hist = localStorage.getItem('casino_hist') ? JSON.parse(localStorage.getItem('casino_hist')) : [];
    let bet = 0, side = null, state = 'betting';
    const dIcons = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

    function updateUI() { 
        document.getElementById('money').innerText = bal.toLocaleString(); 
        document.getElementById('tx-bet').innerText = bet.toLocaleString();
        localStorage.setItem('casino_bal', bal);
        renderHist();
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function switchGame(g) { toggleMenu(); }

    function sync() {
        const now = new Date();
        const sec = now.getSeconds();
        const rem = 60 - sec;
        document.getElementById('timer').innerText = rem < 10 ? "0" + rem : rem;

        if (sec < 50) {
            if (state !== 'betting') resetGame();
        } else if (sec === 50 && state === 'betting') {
            runSecretAnim();
        }
        
        if (sec === 0 && (state === 'animating' || state === 'betting')) finishGame();
    }
    setInterval(sync, 1000);

    function runSecretAnim() {
        state = 'animating';
        const bowl = document.getElementById('bowl');
        document.getElementById('s-shake').play().catch(()=>{});
        
        bowl.classList.add('bowl-fly-up');
        document.querySelectorAll('.dice').forEach(d => d.classList.add('dice-spin'));

        setTimeout(() => {
            const now = new Date();
            const seed = now.getMinutes() + now.getSeconds();
            let r1 = (Math.floor(Math.random()*6))+1;
            let r2 = (Math.floor(Math.random()*6))+1;
            let r3 = (Math.floor(Math.random()*6))+1;
            
            window.res = (r1+r2+r3) >= 11 ? 'tai' : 'xiu';
            window.winVal = (r1===r2 && r2===r3) ? bet*5 : bet*1.95;

            document.getElementById('d1').innerText = dIcons[r1];
            document.getElementById('d2').innerText = dIcons[r2];
            document.getElementById('d3').innerText = dIcons[r3];

            bowl.classList.remove('bowl-fly-up');
            bowl.classList.add('bowl-fly-down');
            
            // Đợi bát rơi xuống xong mới cho phép nặn
            setTimeout(() => {
                bowl.classList.remove('bowl-fly-down'); // QUAN TRỌNG: Xóa animation để nặn được
                bowl.innerText = "NẶN ĐI!";
                document.querySelectorAll('.dice').forEach(d => d.classList.remove('dice-spin'));
            }, 600);
        }, 800);
    }

    function finishGame() {
        if(state === 'finished') return;
        state = 'finished';
        document.getElementById('bowl').style.display = 'none';
        
        if (side === window.res && bet > 0) {
            bal += window.winVal;
            showWin(window.winVal);
        }
        
        if(window.res) {
            hist.push(window.res);
            localStorage.setItem('casino_hist', JSON.stringify(hist));
        }
        updateUI();
    }

    function resetGame() {
        state = 'betting'; bet = 0; side = null; window.res = null;
        const b = document.getElementById('bowl');
        b.style.display = 'flex';
        b.style.transform = 'translate(0,0) rotate(0deg)';
        b.className = "";
        b.innerText = "ÚP BÁT";
        document.querySelectorAll('.dice').forEach(d => d.innerText = "?");
        document.querySelectorAll('.active-side').forEach(el => el.classList.remove('active-side'));
        updateUI();
    }

    // --- XỬ LÝ NẶN BÁT ---
    const bEl = document.getElementById('bowl');
    let sX, sY, isDragging = false;

    bEl.addEventListener('touchstart', (e) => {
        if(bEl.innerText === "NẶN ĐI!") {
            isDragging = true;
            sX = e.touches[0].clientX;
            sY = e.touches[0].clientY;
        }
    }, {passive: true});

    bEl.addEventListener('touchmove', (e) => {
        if(!isDragging || bEl.innerText !== "NẶN ĐI!") return;
        
        let dx = e.touches[0].clientX - sX;
        let dy = e.touches[0].clientY - sY;
        
        // Di chuyển bát theo tay
        bEl.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx/10}deg)`;
        
        // Nếu kéo ra xa hơn 120px thì mở bát luôn
        if(Math.abs(dx) > 120 || Math.abs(dy) > 120) {
            isDragging = false;
            finishGame();
        }
    }, {passive: false});

    bEl.addEventListener('touchend', () => { isDragging = false; });

    function setSide(s) {
        if(state !== 'betting') return;
        side = s;
        document.querySelectorAll('#side-xiu, #side-tai').forEach(el => el.classList.remove('active-side'));
        document.getElementById('side-'+s).classList.add('active-side');
    }

    const txChips = document.getElementById('tx-chips');
    [1000, 10000, 100000, 1000000, 10000000].forEach(a => {
        let d = document.createElement('div'); d.className = 'chip';
        d.innerText = a >= 1000000 ? (a/1000000)+'M' : (a/1000)+'K';
        d.onclick = () => { 
            if(state==='betting' && side && bal>=a) { 
                bal-=a; bet+=a; updateUI(); 
            } else if(!side) alert("Chọn bên trước!"); 
        };
        txChips.appendChild(d);
    });

    function renderHist() {
        const box = document.getElementById('tx-hist'); box.innerHTML = "";
        hist.slice(-20).forEach(r => {
            let d = document.createElement('div'); d.className = `dot dot-${r}`;
            d.innerText = r.substring(0,1).toUpperCase(); box.appendChild(d);
        });
        box.scrollLeft = box.scrollWidth;
    }

    function showWin(a) {
        document.getElementById('s-win').play().catch(()=>{});
        let t = document.getElementById('win-txt');
        t.innerText = "+" + a.toLocaleString(); t.classList.add('fly');
        setTimeout(() => t.classList.remove('fly'), 2000);
    }

    updateUI(); sync();
</script>
</body>
</html>
