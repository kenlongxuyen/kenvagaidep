<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gái Đẹp Casino - Hiệu Ứng 50s</title>
    <style>
        :root { --gold: #ffcc00; --red: #ff3333; --bg: #0d0d0d; --green: #2ecc71; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; user-select: none; touch-action: none; overflow: hidden; }
        
        .header { background: #000; width: 100%; padding: 10px 0; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid var(--gold); z-index: 100; }
        .balance { font-size: 20px; color: var(--gold); font-weight: bold; }

        .game-screen { display: flex; flex-direction: column; align-items: center; width: 100vw; height: calc(100vh - 100px); padding-top: 20px; }
        .timer-box { font-size: 45px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px orange; margin-bottom: 5px; }

        .table { width: 95%; background: radial-gradient(circle, #1a2a3a, #000); border-radius: 30px; border: 3px solid #444; padding: 25px 0; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        /* HIỆU ỨNG BÁT ĐĨA */
        .bowl-wrap { position: relative; width: 220px; height: 220px; background: #111; border-radius: 50%; border: 10px solid #5d3a1a; display: flex; align-items: center; justify-content: center; overflow: visible; }
        
        .dice { width: 50px; height: 50px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: black; font-size: 35px; margin: 0 5px; transition: 0.5s; }
        
        /* Xúc xắc bay và xoay */
        .dice-fly { animation: diceTumble 1.5s ease-out forwards; }
        @keyframes diceTumble {
            0% { transform: translateY(0) rotate(0); }
            30% { transform: translateY(-100px) rotate(360deg); }
            70% { transform: translateY(-100px) rotate(720deg); }
            100% { transform: translateY(0) rotate(1080deg); }
        }

        #bowl { 
            position: absolute; top: -5px; left: -5px; width: 230px; height: 230px; 
            background: radial-gradient(circle, #ddd, #666); border-radius: 50%; 
            z-index: 10; display: none; align-items: center; justify-content: center; 
            font-weight: bold; color: #222; box-shadow: 0 10px 30px #000;
            touch-action: none;
        }

        /* Cái tô bay vào úp */
        .bowl-in { display: flex !important; animation: bowlDrop 1s ease-in forwards; }
        @keyframes bowlDrop {
            0% { transform: translateY(-500px) scale(2); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .chips { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 90%; margin-top: 20px; }
        .chip { height: 45px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; cursor: pointer; background: #34495e; }
        .active-side { border: 4px solid var(--gold) !important; background: rgba(255, 204, 0, 0.3) !important; }

        #win-txt { position: fixed; top: 40%; font-size: 60px; color: var(--gold); font-weight: bold; opacity: 0; pointer-events: none; z-index: 500; text-shadow: 0 0 20px #000; }
        .fly { animation: flyText 2s forwards; }
        @keyframes flyText { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-200px); } }
    </style>
</head>
<body>

    <audio id="s-shake" src="https://www.soundjay.com/misc/sounds/dice-shake-1.mp3"></audio>
    <audio id="s-win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div class="header">
        <div class="balance">💰 <span id="money">0</span></div>
        <div style="font-size: 11px; color: #888;" id="session-txt">PHIÊN ĐANG CHỜ...</div>
    </div>

    <div id="win-txt">+0</div>

    <div class="game-screen">
        <div class="timer-box" id="timer">60</div>
        
        <div class="table">
            <div style="display:flex; width:100%; justify-content:space-around; margin-bottom: 10px;">
                <div id="tx-xiu" onclick="betSide('xiu')" style="font-size:40px; font-weight:900; border-radius: 10px; padding: 5px 15px;">XỈU</div>
                <div id="tx-tai" onclick="betSide('tai')" style="font-size:40px; font-weight:900; color:var(--red); border-radius: 10px; padding: 5px 15px;">TÀI</div>
            </div>

            <div class="bowl-wrap">
                <div id="bowl">NẶN ĐI!</div>
                <div style="display:flex;">
                    <div id="d1" class="dice">⚀</div>
                    <div id="d2" class="dice">⚁</div>
                    <div id="d3" class="dice">⚂</div>
                </div>
            </div>
            
            <div style="color:var(--gold); font-weight:bold; margin-top: 10px;">Đã cược: <span id="bet-val">0</span></div>
        </div>

        <div class="chips" id="chip-box"></div>
        <p style="font-size: 12px; color: #666; margin-top: 15px;" id="status-txt">Đang trong thời gian đặt cược...</p>
    </div>

<script>
    let bal = localStorage.getItem('casino_bal') ? parseInt(localStorage.getItem('casino_bal')) : 1000000;
    let currentBet = 0, side = null, state = 'betting';
    const diceIcons = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

    function sync() {
        const now = new Date();
        const sec = now.getSeconds();
        const remaining = 60 - sec;
        
        document.getElementById('timer').innerText = remaining < 10 ? "0" + remaining : remaining;
        document.getElementById('session-txt').innerText = "PHIÊN: #" + now.getHours() + now.getMinutes();
        document.getElementById('money').innerText = bal.toLocaleString();

        // 0s - 49s: Thời gian đặt cược
        if (sec < 50) {
            if (state !== 'betting') resetGame();
            document.getElementById('status-txt').innerText = "Vui lòng đặt cược...";
        } 
        // 50s: Hiệu ứng xúc xắc bay và tô úp
        else if (sec === 50 && state === 'betting') {
            triggerAnimation();
        }
        // 51s - 59s: Thời gian nặn
        else if (sec > 50) {
            document.getElementById('status-txt').innerText = "Mời gái đẹp nặn bài!";
        }
        
        // Giây thứ 0: Kết thúc phiên, tự động mở bát nếu chưa nặn
        if (sec === 0 && state === 'animating') {
            finishSession();
        }
    }
    setInterval(sync, 1000);

    function triggerAnimation() {
        state = 'animating';
        document.getElementById('s-shake').play().catch(()=>{});
        
        // Tính kết quả đồng bộ cho cả sever
        const now = new Date();
        const seed = now.getHours() + now.getMinutes();
        let r1 = (seed % 6) + 1, r2 = ((seed * 7) % 6) + 1, r3 = ((seed * 13) % 6) + 1;
        window.res = (r1+r2+r3) >= 11 ? 'tai' : 'xiu';
        window.winAmt = (r1===r2 && r2===r3) ? currentBet * 5 : currentBet * 1.95;

        // Xúc xắc bay lên
        document.querySelectorAll('.dice').forEach((d, i) => {
            d.classList.add('dice-fly');
            setTimeout(() => {
                d.innerText = diceIcons[[r1, r2, r3][i]];
            }, 1000);
        });

        // Cái tô bay vào úp sau 1.5s
        setTimeout(() => {
            document.getElementById('bowl').classList.add('bowl-in');
        }, 1500);
    }

    function finishSession() {
        state = 'finished';
        document.getElementById('bowl').style.display = 'none';
        
        if (side === window.res && currentBet > 0) {
            bal += window.winAmt;
            showWin(window.winAmt);
        }
        localStorage.setItem('casino_bal', bal);
        
        setTimeout(resetGame, 3000);
    }

    function resetGame() {
        state = 'betting';
        currentBet = 0; side = null;
        document.getElementById('bet-val').innerText = "0";
        document.getElementById('bowl').classList.remove('bowl-in');
        document.getElementById('bowl').style.display = 'none';
        document.getElementById('bowl').style.transform = 'translate(0,0)';
        document.querySelectorAll('.dice').forEach(d => {
            d.classList.remove('dice-fly');
            d.innerText = "?";
        });
        document.querySelectorAll('.active-side').forEach(el => el.classList.remove('active-side'));
    }

    // XỬ LÝ NẶN TRÊN ĐIỆN THOẠI (FIX SCROLL)
    const bowlEl = document.getElementById('bowl');
    let sX, sY;
    bowlEl.addEventListener('touchstart', (e) => { 
        if(state==='animating') { 
            sX = e.touches[0].clientX; sY = e.touches[0].clientY; 
            e.preventDefault(); 
        } 
    }, {passive: false});

    bowlEl.addEventListener('touchmove', (e) => {
        if(state!=='animating') return;
        e.preventDefault();
        let dx = e.touches[0].clientX - sX, dy = e.touches[0].clientY - sY;
        bowlEl.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx/5}deg)`;
        if(Math.abs(dx)>130 || Math.abs(dy)>130) finishSession();
    }, {passive: false});

    // Chip & Side
    function betSide(s) { if(state==='betting'){ side = s; document.querySelectorAll('[id^="tx-"]').forEach(el => el.classList.remove('active-side')); document.getElementById('tx-'+s).classList.add('active-side'); }}
    const cb = document.getElementById('chip-box');
    [1000, 10000, 100000, 1000000, 10000000].forEach(a => {
        let d = document.createElement('div'); d.className = 'chip';
        d.innerText = a >= 1000000 ? (a/1000000)+'M' : (a/1000)+'K';
        d.onclick = () => { if(state==='betting' && side && bal>=a) { bal-=a; currentBet+=a; document.getElementById('bet-val').innerText = currentBet.toLocaleString(); document.getElementById('money').innerText = bal.toLocaleString(); }};
        cb.appendChild(d);
    });

    function showWin(a) {
        document.getElementById('s-win').play().catch(()=>{});
        let t = document.getElementById('win-txt');
        t.innerText = "+" + a.toLocaleString(); t.classList.add('fly');
        setTimeout(() => t.classList.remove('fly'), 2000);
    }
    
    sync();
</script>
</body>
</html>
