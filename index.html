<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKYWIN MD5 - PRO INTERFACE</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(180deg, #ffed8a 0%, #ffc107 50%, #c19100 100%);
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.9);
            --red-win: #ff3e3e;
        }

        body {
            margin: 0;
            padding: 0;
            background: url('https://img.freepik.com/free-vector/luxury-dark-red-gold-background_1017-23428.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Overlay làm tối nền để nổi bật UI */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        /* Container chính giống ảnh */
        .game-container {
            position: relative;
            width: 1000px;
            height: 600px;
            display: flex;
            gap: 20px;
        }

        /* Bảng soi cầu bên trái */
        .soi-cau-panel {
            width: 300px;
            background: var(--panel-bg);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .soi-cau-header {
            color: #ffc107;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .grid-history {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
        }

        .dot {
            width: 18px; height: 18px;
            border-radius: 50%;
            border: 1px solid #555;
        }
        .dot.tai { background: #ff3e3e; box-shadow: 0 0 5px #ff3e3e; }
        .dot.xiu { background: #eee; box-shadow: 0 0 5px #eee; }

        /* Khung Tài Xỉu MD5 chính giữa */
        .main-board {
            flex: 1;
            background: radial-gradient(circle, #4b0000 0%, #1a0000 100%);
            border: 4px solid #7a5a1a;
            border-radius: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .md5-hash {
            position: absolute;
            bottom: 40px;
            background: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #00ff00;
            border: 1px solid #333;
        }

        .timer-circle {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 8px solid #ffc107;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .bet-side {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            width: 200px;
        }
        .side-tai { left: 40px; }
        .side-xiu { right: 40px; }

        .btn-bet {
            background: var(--gold-gradient);
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .bet-amount {
            color: #ffc107;
            font-size: 22px;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Lớp nặn xúc xắc */
        #nan-overlay {
            display: none;
            position: absolute;
            width: 200px; height: 200px;
            background: url('https://img.freepik.com/free-photo/black-plate-texture_1203-34.jpg');
            background-size: cover;
            border-radius: 50%;
            z-index: 100;
            cursor: grab;
            box-shadow: 0 0 20px black;
            border: 2px solid #555;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .dice-result {
            display: flex;
            gap: 10px;
            position: absolute;
            z-index: 50;
        }
        .dice {
            width: 40px; height: 40px;
            background: white;
            color: black;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        /* Nạp tiền */
        .recharge-btn {
            position: fixed;
            bottom: 20px; right: 20px;
            background: #2ecc71;
            padding: 15px; border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="game-container">
    <div class="soi-cau-panel">
        <div class="soi-cau-header">THẦN TÀI - LỊCH SỬ</div>
        <div class="grid-history" id="history-grid">
            </div>
        <div class="soi-cau-header" style="margin-top:20px">MD5 HASH</div>
        <div style="font-size: 10px; word-break: break-all; color: #888;" id="current-md5">...</div>
    </div>

    <div class="main-board">
        <div class="bet-side side-tai">
            <h1 style="font-size: 60px; margin:0">TÀI</h1>
            <div class="bet-amount" id="total-tai">125,450,000</div>
            <button class="btn-bet">CƯỢC</button>
        </div>

        <div class="timer-circle" id="main-timer">60</div>
        
        <div class="dice-result" id="dice-area">
            <div class="dice" id="d1">?</div>
            <div class="dice" id="d2">?</div>
            <div class="dice" id="d3">?</div>
        </div>
        <div id="nan-overlay">KÉO ĐỂ NẶN</div>

        <div class="bet-side side-xiu">
            <h1 style="font-size: 60px; margin:0">XỈU</h1>
            <div class="bet-amount" id="total-xiu">98,210,000</div>
            <button class="btn-bet">CƯỢC</button>
        </div>

        <div class="md5-hash">Chuỗi MD5: <span id="md5-display">6dfb6010...ccda725c</span></div>
    </div>
</div>

<div class="recharge-btn" onclick="let n = prompt('Nhập số tiền:'); if(n) alert('Đã nạp ' + n);">💰</div>

<script>
    const timerEl = document.getElementById('main-timer');
    const nanOverlay = document.getElementById('nan-overlay');
    const historyGrid = document.getElementById('history-grid');
    
    let history = ['tai', 'xiu', 'tai', 'tai', 'xiu', 'xiu', 'tai']; // Demo
    let isNanning = false;

    // Hàm giả lập kết quả ĐỒNG BỘ theo phút (2 người vào cùng lúc sẽ thấy kết quả giống nhau)
    function getSyncResult() {
        const now = new Date();
        const seed = now.getMinutes() + now.getHours(); // Tạo seed chung
        const d1 = (seed % 6) + 1;
        const d2 = ((seed * 2) % 6) + 1;
        const d3 = ((seed * 3) % 6) + 1;
        return [d1, d2, d3];
    }

    function renderHistory() {
        historyGrid.innerHTML = history.map(h => `<div class="dot ${h}"></div>`).join('');
    }

    function updateGame() {
        const now = new Date();
        const seconds = now.getSeconds();
        const remaining = 60 - seconds;

        timerEl.innerText = remaining;

        // Khi thời gian dưới 5 giây: Chuẩn bị mở bát
        if (remaining <= 5 && remaining > 0) {
            nanOverlay.style.display = 'flex';
            const res = getSyncResult();
            document.getElementById('d1').innerText = res[0];
            document.getElementById('d2').innerText = res[1];
            document.getElementById('d3').innerText = res[2];
        } 
        
        // Khi hết thời gian: Reset phiên mới
        if (remaining === 0 || remaining > 55) {
            nanOverlay.style.display = 'none';
            nanOverlay.style.opacity = '1';
            document.getElementById('d1').innerText = '?';
            document.getElementById('d2').innerText = '?';
            document.getElementById('d3').innerText = '?';
            
            // Cập nhật soi cầu phiên vừa xong
            if (remaining === 59) {
                const res = getSyncResult();
                const total = res[0] + res[1] + res[2];
                history.push(total >= 11 ? 'tai' : 'xiu');
                if(history.length > 40) history.shift();
                renderHistory();
            }
        }
        
        // Giả lập tiền cược nhảy liên tục cho sinh động
        document.getElementById('total-tai').innerText = (Math.floor(Math.random() * 500) + 100) + ",000,000";
        document.getElementById('total-xiu').innerText = (Math.floor(Math.random() * 500) + 100) + ",000,000";
    }

    // Xử lý nặn bằng cách kéo/click
    nanOverlay.addEventListener('mousedown', function() {
        this.style.transition = '2s';
        this.style.opacity = '0';
        setTimeout(() => { this.style.display = 'none'; }, 2000);
    });

    renderHistory();
    setInterval(updateGame, 1000);
</script>

</body>
</html>
