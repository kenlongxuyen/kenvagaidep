<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gái Đẹp Casino - MD5 & SicBo</title>
    <style>
        :root { --gold: #ffcc00; --red: #ff3333; --blue: #3498db; --bg: #0d0d0d; --green: #2ecc71; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; user-select: none; touch-action: none; overflow: hidden; height: 100vh; }
        
        /* Header */
        .header { background: linear-gradient(to bottom, #222, #000); width: 100%; padding: 12px 0; border-bottom: 2px solid var(--gold); z-index: 100; position: relative; }
        .top-row { display: flex; justify-content: space-around; width: 100%; align-items: center; }
        .balance { font-size: 24px; color: var(--gold); font-weight: bold; text-shadow: 0 0 10px gold; }

        /* Sidebar */
        #sidebar { position: fixed; top: 0; left: -100%; width: 260px; height: 100%; background: #111; z-index: 2000; transition: 0.3s; border-right: 2px solid var(--gold); padding: 20px; box-sizing: border-box; }
        #sidebar.open { left: 0; }
        .menu-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; color: var(--gold); font-weight: bold; font-size: 18px; }

        /* Game UI */
        .game-screen { display: none; flex-direction: column; align-items: center; width: 100vw; height: calc(100vh - 100px); padding-top: 10px; }
        .active-game { display: flex; }

        /* Soi Cầu (Lịch sử) */
        .history-board { width: 92%; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 15px; display: flex; gap: 5px; padding: 8px; overflow-x: auto; min-height: 30px; border: 1px solid #444; }
        .dot { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; color: white; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .dot-tai { background: radial-gradient(circle, #ff5555, #880000); }
        .dot-xiu { background: radial-gradient(circle, #5555ff, #000088); }

        .timer-box { font-size: 40px; font-weight: 900; color: var(--gold); margin-bottom: 10px; text-shadow: 0 0 20px orange; font-family: monospace; }
        
        .table { width: 95%; background: radial-gradient(circle, #1a2a3a, #000); border-radius: 30px; border: 4px solid #444; padding: 20px 0; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        /* Hiệu ứng sáng bên thắng */
        .glow-win { animation: glow 0.5s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 5px #fff; transform: scale(1); } to { text-shadow: 0 0 30px var(--gold); transform: scale(1.2); color: #fff; } }

        .bowl-wrap { position: relative; width: 200px; height: 200px; background: #111; border-radius: 50%; border: 10px solid #5d3a1a; display: flex; align-items: center; justify-content: center; margin: 15px 0; box-shadow: inset 0 0 20px #000; }
        #bowl { position: absolute; top: -5px; left: -5px; width: 210px; height: 210px; background: radial-gradient(circle, #eee, #999, #444); border-radius: 50%; z-index: 10; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #222; font-size: 20px; box-shadow: 0 10px 40px #000; touch-action: none; }
        .dice { width: 48px; height: 48px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: black; font-size: 38px; margin: 0 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }

        .chips { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; width: 95%; margin-top: 20px; }
        .chip { height: 40px; border-radius: 20px; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; cursor: pointer; color: #fff; background: #34495e; box-shadow: 0 4px 0 #000; }
        .chip:active { transform: translateY(2px); box-shadow: none; }
        .btn-allin { background: linear-gradient(to bottom, #ff0000, #aa0000) !important; color: white !important; border-color: var(--gold) !important; }
        
        .active-side { border: 3px solid var(--gold) !important; background: rgba(255, 204, 0, 0.3) !important; border-radius: 15px; }
        
        #win-txt { position: fixed; top: 40%; font-size: 70px; color: var(--gold); font-weight: 900; opacity: 0; pointer-events: none; z-index: 5000; text-shadow: 0 0 30px #000; }
        .fly { animation: flyText 2.5s forwards; }
        @keyframes flyText { 0% { opacity:0; transform: translateY(0) scale(0.5); } 20% { opacity:1; transform: translateY(-50px) scale(1.2); } 100% { opacity:0; transform: translateY(-200px) scale(1); } }
    </style>
</head>
<body>

    <audio id="s-shake" src="https://www.soundjay.com/misc/sounds/dice-shake-1.mp3"></audio>
    <audio id="s-win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <div id="sidebar">
        <div class="menu-item" onclick="switchGame('taixiu')">🎲 TÀI XỈU MD5 (60S)</div>
        <div class="menu-item" onclick="switchGame('sicbo')">🏮 SIC BO SIÊU CẤP</div>
        <div class="menu-item" onclick="resetVoi()" style="color:red; margin-top:50px;">🗑️ RESET DỮ LIỆU</div>
    </div>

    <div class="header">
        <div class="top-row">
            <div onclick="toggleMenu()" style="font-size:32px; color:var(--gold); cursor:pointer;">☰</div>
            <div class="balance">💰 <span id="money">0</span></div>
            <button class="chip" style="background:var(--green); color:black; padding:0 15px; width:80px;" onclick="bal+=1000000; updateUI();">NẠP</button>
        </div>
    </div>

    <div id="win-txt">+0</div>

    <div id="taixiu" class="game-screen active-game">
        <div class="timer-box" id="timer">60</div>
        <div class="history-board" id="tx-history"></div>
        <div class="table">
            <div style="display:flex; width:100%; justify-content:space-around;">
                <div id="tx-side-xiu" onclick="setSide('xiu')" style="font-size:45px; font-weight:900; padding:10px;">XỈU</div>
                <div id="tx-side-tai" onclick="setSide('tai')" style="font-size:45px; font-weight:900; color:var(--red); padding:10px;">TÀI</div>
            </div>
            <div class="bowl-wrap">
                <div id="bowl">NẶN ĐI!</div>
                <div style="display:flex;"><div id="d1" class="dice">?</div><div id="d2" class="dice">?</div><div id="d3" class="dice">?</div></div>
            </div>
            <div style="color:var(--gold); font-weight:bold; font-size:18px;">Cược: <span id="tx-bet-val">0</span></div>
        </div>
        <div class="chips" id="tx-chips"></div>
    </div>

    <div id="sicbo" class="game-screen">
        <h2 style="color:var(--gold)">🏮 SIC BO ĐANG TẢI...</h2>
        <p>Vui lòng chơi Tài Xỉu MD5 trong lúc bảo trì!</p>
    </div>

<script>
    // --- KHỞI TẠO DỮ LIỆU TỪ STORAGE ---
    let bal = localStorage.getItem('casino_bal') ? parseInt(localStorage.getItem('casino_bal')) : 1000000;
    let historyTX = localStorage.getItem('casino_hist_tx') ? JSON.parse(localStorage.getItem('casino_hist_tx')) : [];
    
    let currentBet = 0, side = null, state = 'wait';
    const diceIcons = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
    const amts = [1000, 10000, 100000, 1000000, 5000000];

    function saveData() { 
        localStorage.setItem('casino_bal', bal); 
        localStorage.setItem('casino_hist_tx', JSON.stringify(historyTX));
    }

    // --- ĐỒNG BỘ THỜI GIAN THỰC 60S ---
    function syncServer() {
        const now = new Date();
        const seconds = now.getSeconds();
        const rem = 60 - seconds;
        
        document.getElementById('timer').innerText = rem < 10 ? "0" + rem : rem;

        // 0-50s: Đặt cược
        if (seconds < 50) {
            if (state !== 'wait') resetBanMoi();
            document.getElementById('bowl').innerText = "CƯỢC ĐI!";
        } 
        // 50-57s: Thời gian nặn
        else if (seconds >= 50 && seconds < 57) {
            if (state === 'wait') startAnimation();
            document.getElementById('bowl').innerText = "NẶN ĐI!";
        }
        // 57-60s: TỰ ĐỘNG MỞ (Nếu người chơi chưa nặn)
        else if (seconds >= 57) {
            if (state === 'playing') forceFinish();
        }
    }
    setInterval(syncServer, 1000);

    function startAnimation() {
        state = 'playing';
        document.getElementById('s-shake').play().catch(()=>{});
        
        const now = new Date();
        const seed = now.getHours() + now.getMinutes();
        let r1 = (seed % 6) + 1;
        let r2 = ((seed * 3) % 6) + 1;
        let r3 = ((seed * 7) % 6) + 1;
        
        window.res = (r1+r2+r3) >= 11 ? 'tai' : 'xiu';
        window.winAmt = (r1===r2 && r2===r3) ? currentBet * 5 : currentBet * 1.95;
        
        document.getElementById('d1').innerText = diceIcons[r1];
        document.getElementById('d2').innerText = diceIcons[r2];
        document.getElementById('d3').innerText = diceIcons[r3];
    }

    function forceFinish() {
        if(state !== 'playing') return;
        document.getElementById('bowl').style.display = 'none';
        finishLogic();
    }

    function finishLogic() {
        state = 'end';
        // Hiệu ứng sáng bên thắng
        document.getElementById('tx-side-' + window.res).classList.add('glow-win');
        
        if (side === window.res && currentBet > 0) {
            bal += window.winAmt;
            showWinEffect(window.winAmt);
        }
        historyTX.push(window.res);
        saveData();
        renderHistory();
        updateUI();
    }

    function resetBanMoi() {
        state = 'wait';
        currentBet = 0; side = null;
        const b = document.getElementById('bowl');
        b.style.display = 'flex';
        b.style.transform = 'translate(0,0)';
        document.querySelectorAll('.dice').forEach(d => d.innerText = "?");
        document.querySelectorAll('.active-side, .glow-win').forEach(el => el.classList.remove('active-side', 'glow-win'));
        updateUI();
    }

    // --- CHIPS & CƯỢC ---
    const txChips = document.getElementById('tx-chips');
    amts.forEach(a => {
        let d = document.createElement('div'); d.className = 'chip';
        d.innerText = a >= 1000000 ? (a/1000000)+'M' : (a/1000)+'K';
        d.onclick = () => { if(new Date().getSeconds() < 50 && side && bal >= a) { bal -= a; currentBet += a; updateUI(); saveData(); } };
        txChips.appendChild(d);
    });
    // Nút All-in
    let allin = document.createElement('div'); allin.className = 'chip btn-allin'; allin.innerText = 'ALL IN';
    allin.onclick = () => { if(new Date().getSeconds() < 50 && side && bal > 0) { currentBet += bal; bal = 0; updateUI(); saveData(); } else if(!side) alert("Chọn bên trước!"); };
    txChips.appendChild(allin);

    function setSide(s) {
        if(new Date().getSeconds() >= 50) return;
        side = s;
        document.querySelectorAll('[id^="tx-side-"]').forEach(el => el.classList.remove('active-side'));
        document.getElementById('tx-side-' + s).classList.add('active-side');
    }

    // --- NẶN TÀI XỈU (FIX MOBILE) ---
    const bBowl = document.getElementById('bowl');
    let sX, sY;
    bBowl.addEventListener('touchstart', (e) => { 
        if(state==='playing'){ 
            sX=e.touches[0].clientX; sY=e.touches[0].clientY; 
            e.preventDefault(); 
        } 
    }, {passive:false});
    bBowl.addEventListener('touchmove', (e) => {
        if(state!=='playing') return;
        let dx = e.touches[0].clientX-sX, dy = e.touches[0].clientY-sY;
        bBowl.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx/5}deg)`;
        if(Math.abs(dx)>130 || Math.abs(dy)>130) {
            bBowl.style.display='none';
            finishLogic();
        }
    }, {passive:false});

    // --- UI HELPERS ---
    function updateUI() {
        document.getElementById('money').innerText = bal.toLocaleString();
        document.getElementById('tx-bet-val').innerText = currentBet.toLocaleString();
    }
    function renderHistory() {
        const container = document.getElementById('tx-history');
        container.innerHTML = "";
        historyTX.slice(-20).forEach(res => {
            let d = document.createElement('div');
            d.className = `dot dot-${res}`;
            d.innerText = res.substring(0,1).toUpperCase();
            container.appendChild(d);
        });
        container.scrollLeft = container.scrollWidth;
    }
    function showWinEffect(a) {
        document.getElementById('s-win').play().catch(()=>{});
        let t = document.getElementById('win-txt');
        t.innerText = "+" + a.toLocaleString(); t.classList.add('fly');
        setTimeout(() => t.classList.remove('fly'), 2500);
    }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function switchGame(g) { toggleMenu(); document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active-game')); document.getElementById(g).classList.add('active-game'); }
    function resetVoi() { if(confirm("Xóa sạch lịch sử và tiền?")) { localStorage.clear(); location.reload(); } }

    updateUI(); renderHistory(); syncServer();
</script>
</body>
</html>
