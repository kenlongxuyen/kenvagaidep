<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP CASINO ALL-IN-ONE</title>
    <style>
        :root {
            --gold: #ffcc00;
            --dark: #1a1a1a;
            --red: #e74c3c;
            --blue: #3498db;
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid var(--gold);
            width: 100%;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .balance-box {
            font-size: 24px;
            color: var(--gold);
            font-weight: bold;
            background: #333;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }
        button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: var(--gold);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        .game-area {
            display: none;
            width: 100%;
            max-width: 500px;
            background: #2c3e50;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }
        .active { display: block; }
        .history {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 14px;
            color: #ddd;
        }
        .shaking {
            font-size: 50px;
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        .input-group { margin: 15px 0; }
        input { padding: 10px; border-radius: 5px; border: none; width: 150px; }
        .result-dot {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            display: inline-block;
            margin: 2px;
        }
        .tai { background-color: var(--red); }
        .xiu { background-color: white; }
    </style>
</head>
<body>

<div class="header">
    <h1>💎 VIP CASINO ONLINE</h1>
    <div class="balance-box">Ví: <span id="balance">1000</span> Xu</div>
</div>

<div class="menu">
    <button onclick="showGame('tai-xiu')">Tài Xỉu</button>
    <button onclick="showGame('lo-to')">Lô Tô</button>
    <button onclick="showGame('da-ga')">Đá Gà</button>
    <button onclick="showGame('baccarat')">Baccarat</button>
    <button onclick="showGame('tien-len')">Tiến Lên</button>
    <button onclick="showGame('nap-tien')" style="background: #2ecc71;">Nạp Tiền</button>
</div>

<div id="tai-xiu" class="game-area">
    <h3>TÀI XỈU - SOI CẦU</h3>
    <div id="tx-history" class="history">Cầu: </div>
    <div id="dice-display" style="font-size: 40px;">🎲🎲🎲</div>
    <div class="input-group">
        <input type="number" id="tx-bet" placeholder="Tiền cược...">
        <br><br>
        <button onclick="playTaiXiu('Tài')" style="background:var(--red)">Cược Tài</button>
        <button onclick="playTaiXiu('Xỉu')" style="background:white">Cược Xỉu</button>
    </div>
</div>

<div id="lo-to" class="game-area">
    <h3>LÔ TÔ MIỀN BẮC (1 ĂN 70)</h3>
    <input type="text" id="lo-num" placeholder="Số (00-99)" maxlength="2">
    <input type="number" id="lo-bet" placeholder="Tiền cược">
    <button onclick="playLoto()">Ghi Số</button>
    <p id="lo-res"></p>
</div>

<div id="da-ga" class="game-area">
    <h3>ĐÁ GÀ THOMO</h3>
    <button onclick="playDaGa('Meron')" style="background:var(--red)">Gà Meron</button>
    <button onclick="playDaGa('Wala')" style="background:var(--blue); color:white">Gà Wala</button>
    <p id="dg-res"></p>
</div>

<div id="nap-tien" class="game-area">
    <h3>CỔNG NẠP TỰ ĐỘNG</h3>
    <input type="number" id="nap-amount" placeholder="Nhập số xu muốn nạp">
    <button onclick="recharge()">Xác nhận nạp</button>
</div>

<div id="baccarat" class="game-area"><h3>BACCARAT</h3><button onclick="alert('Tính năng đang đồng bộ...')">Chơi ngay</button></div>
<div id="tien-len" class="game-area"><h3>TIẾN LÊN SOLO</h3><button onclick="alert('Tính năng đang đồng bộ...')">Vào bàn</button></div>

<script>
    let balance = 1000;
    let txHistory = [];

    function updateBalance() {
        document.getElementById('balance').innerText = balance.toLocaleString();
    }

    function showGame(id) {
        document.querySelectorAll('.game-area').forEach(g => g.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function recharge() {
        let amt = parseInt(document.getElementById('nap-amount').value);
        if (amt > 0) {
            balance += amt;
            updateBalance();
            alert("Nạp thành công " + amt + " xu!");
        }
    }

    function playTaiXiu(choice) {
        let bet = parseInt(document.getElementById('tx-bet').value);
        if (isNaN(bet) || bet > balance || bet <= 0) return alert("Tiền cược không hợp lệ!");

        let display = document.getElementById('dice-display');
        display.innerHTML = "🥣"; // Hình cái bát úp
        display.classList.add('shaking');

        setTimeout(() => {
            display.classList.remove('shaking');
            let d1 = Math.floor(Math.random() * 6) + 1;
            let d2 = Math.floor(Math.random() * 6) + 1;
            let d3 = Math.floor(Math.random() * 6) + 1;
            let total = d1 + d2 + d3;
            let resText = total >= 11 ? "Tài" : "Xỉu";
            
            display.innerHTML = `🎲${d1} 🎲${d2} 🎲${d3} = ${total}`;
            
            if (resText === choice) {
                balance += bet;
                alert("THẮNG! Kết quả: " + resText);
            } else {
                balance -= bet;
                alert("THUA! Kết quả: " + resText);
            }

            // Cập nhật soi cầu
            txHistory.push(resText === "Tài" ? "tai" : "xiu");
            renderHistory();
            updateBalance();
        }, 2000);
    }

    function renderHistory() {
        let html = "Cầu: ";
        txHistory.slice(-15).forEach(item => {
            html += `<span class="result-dot ${item}"></span>`;
        });
        document.getElementById('tx-history').innerHTML = html;
    }

    function playLoto() {
        let num = document.getElementById('lo-num').value;
        let bet = parseInt(document.getElementById('lo-bet').value);
        if (num.length !== 2 || bet > balance) return alert("Kiểm tra lại số và tiền!");

        let winNum = Math.floor(Math.random() * 100).toString().padStart(2, '0');
        document.getElementById('lo-res').innerText = "Đang quay giải ĐB...";
        
        setTimeout(() => {
            if (num === winNum) {
                balance += bet * 70;
                alert("TRÚNG LÔ! Con số vàng: " + winNum);
            } else {
                balance -= bet;
                alert("TRƯỢT! Giải ĐB là: " + winNum);
            }
            updateBalance();
        }, 1500);
    }

    function playDaGa(side) {
        alert("Gà đang vào sân...");
        setTimeout(() => {
            let win = Math.random() > 0.5 ? "Meron" : "Wala";
            if (side === win) {
                balance += 100; // Mặc định cược 100 để test nhanh
                alert("Gà " + win + " thắng! Bạn nhận 100 xu.");
            } else {
                balance -= 100;
                alert("Gà " + win + " thắng! Bạn mất 100 xu.");
            }
            updateBalance();
        }, 2000);
    }
</script>

</body>
</html>
